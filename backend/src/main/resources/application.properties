# --- DATABASE SETTINGS ---
# Render will inject these DB variables, but it defaults to local when running on your machine
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/ph-gdae-project}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:your_local_password_here}

# --- REST API ---
spring.data.rest.base-path=/api
spring.data.rest.detection-strategy=annotated

# --- OAUTH2 SETTINGS ---
# Render will inject these secrets securely via Environment Variables
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# --- LOGGING ---
logging.level.org.springframework.security=TRACE
logging.level.org.springframework.security.oauth2=TRACE

# --- HIBERNATE SETTINGS ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
