# --- DATABASE SETTINGS ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/ph-gdae-project}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:your_local_password_here}

# --- REST API ---
spring.data.rest.base-path=/api
spring.data.rest.detection-strategy=annotated

# --- OAUTH2 SETTINGS ---
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${BACKEND_URL:http://localhost:8080}/login/oauth2/code/google

# --- JWT SETTINGS (NEW) --- 
jwt.secret=${JWT_SECRET:your_super_secret_jwt_key_that_should_be_long_and_secure}
jwt.expiration=${JWT_EXPIRATION:86400000}

# --- FRONTEND & BACKEND URLs ---
FRONTEND_URL=${FRONTEND_URL:http://localhost:5173}
BACKEND_URL=${BACKEND_URL:http://localhost:8080}

# --- LOGGING ---
logging.level.org.springframework.security=TRACE
logging.level.org.springframework.security.oauth2=TRACE

# --- HIBERNATE SETTINGS ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- SERVER PORT ---
server.port=${PORT:8080}
